{% extends 'base.html' %}
{% block title %}List Your Property – eNYUMBA{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">List Your Property – Step 1</div>
            <div class="card-body">
                <p>We'll send a verification code to your phone.</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary">Send Code</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
