{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header">Verify Phone</div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <input type="text" name="code" class="form-control" placeholder="6-digit code" required>
                    <button type="submit" class="btn btn-success mt-3">Verify</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
